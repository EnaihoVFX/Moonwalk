<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moonwalk — Agent Dashboard</title>
    <link rel="stylesheet" href="./dashboard.css" />
</head>

<body>
    <div class="dashboard">

        <!-- Header -->
        <header class="dash-header">
            <div class="header-left">
                <div class="moonwalk-logo">🌙</div>
                <h1>Moonwalk Agents</h1>
            </div>
            <div class="header-right">
                <span class="agent-count" id="agent-count">0 agents</span>
                <button class="btn-icon" id="btn-refresh" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="dash-body">

            <!-- Sidebar: Agent List -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-empty" id="sidebar-empty">
                    <div class="empty-icon">🤖</div>
                    <p>No agents yet</p>
                    <p class="empty-hint">Ask Moonwalk to spawn a background agent</p>
                </div>
                <!-- Agent cards injected here by JS -->
            </aside>

            <!-- Main Panel: Agent Detail -->
            <main class="detail-panel" id="detail-panel">

                <!-- Empty state -->
                <div class="detail-empty" id="detail-empty">
                    <div class="empty-icon">📋</div>
                    <p>Select an agent to view details</p>
                </div>

                <!-- Agent detail view (hidden by default) -->
                <div class="detail-content hidden" id="detail-content">

                    <!-- Agent header -->
                    <div class="detail-header">
                        <div class="detail-status-dot" id="detail-status-dot"></div>
                        <div class="detail-info">
                            <h2 id="detail-title">Agent ID</h2>
                            <p class="detail-task" id="detail-task">Task description</p>
                        </div>
                        <div class="detail-meta">
                            <span class="meta-badge" id="detail-elapsed">0s</span>
                            <span class="meta-badge" id="detail-iterations">0 iterations</span>
                        </div>
                    </div>

                    <!-- Checklist section -->
                    <div class="checklist-section hidden" id="checklist-section">
                        <div class="checklist-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                            </svg>
                            Task Checklist
                        </div>
                        <ul class="checklist-list" id="checklist-list">
                            <!-- Checklist items injected here -->
                        </ul>
                    </div>

                    <!-- Log viewer -->
                    <div class="log-viewer" id="log-viewer">
                        <div class="log-empty" id="log-empty">Waiting for agent output...</div>
                        <!-- Log entries injected here -->
                    </div>

                    <!-- Result section -->
                    <div class="result-section hidden" id="result-section">
                        <div class="result-label">Result</div>
                        <div class="result-text" id="result-text"></div>
                    </div>

                    <!-- Error section -->
                    <div class="error-section hidden" id="error-section">
                        <div class="error-label">Error</div>
                        <div class="error-text" id="error-text"></div>
                    </div>

                    <!-- Review section -->
                    <div class="review-section hidden" id="review-section">
                        <div class="review-label">Human Review Required</div>
                        <div class="review-topic" id="review-topic"></div>
                        <div class="review-summary" id="review-summary"></div>
                        <div class="review-actions">
                            <input type="text" id="review-feedback" placeholder="Provide feedback or instructions..." />
                            <button class="btn btn-primary" id="btn-approve">Approve</button>
                            <button class="btn btn-secondary" id="btn-feedback">Send Feedback</button>
                        </div>
                    </div>

                    <!-- Toolbar -->
                    <div class="detail-toolbar">
                        <button class="btn btn-pause" id="btn-pause" title="Pause Agent">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="4" width="4" height="16" rx="1" />
                                <rect x="14" y="4" width="4" height="16" rx="1" />
                            </svg>
                            Pause
                        </button>
                        <button class="btn btn-stop" id="btn-stop" title="Stop Agent">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="4" y="4" width="16" height="16" rx="2" />
                            </svg>
                            Stop
                        </button>
                    </div>

                </div>
            </main>

        </div>
    </div>

    <script src="./dashboard.js"></script>
</body>

</html>
