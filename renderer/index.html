<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moonwalk</title>
  <link rel="stylesheet" href="../node_modules/katex/dist/katex.min.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="stage">
    <div class="glass-pill state-idle" id="ui-wrapper">

      <!-- Speech (Idle / Listening) -->
      <div class="content-wrapper" id="ui-speech">
        <svg class="mic-icon" viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
          <path
            d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
        </svg>
        <span class="status-text" id="status-text">Hey Moonwalk</span>
      </div>

      <!-- Loading (Thinking) -->
      <div class="content-wrapper hidden" id="ui-loading">
        <div class="bouncing-balls">
          <div class="ball"></div>
          <div class="ball"></div>
          <div class="ball"></div>
        </div>
      </div>

      <!-- Doing (Action in progress) -->
      <div class="content-wrapper hidden" id="ui-doing">
        <div class="spinner"></div>
        <img src="" alt="App Icon" class="app-icon" id="app-icon" />
        <span class="status-text" id="doing-text">Processing...</span>
      </div>

    </div>

    <!-- Response Card (conversational answers — appears below pill) -->
    <div class="response-card hidden" id="ui-response">
      <button class="response-dismiss" id="response-dismiss" aria-label="Dismiss">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
      <div class="response-body">
        <span class="response-text" id="response-text"></span><span class="response-cursor"
          id="response-cursor">▌</span>
      </div>
    </div>

    <!-- ═══ MODAL: Rich (long-form content) ═══ -->
    <div class="modal-rich hidden" id="modal-rich">
      <button class="response-dismiss" id="rich-dismiss" aria-label="Dismiss">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
      <div class="modal-rich-title" id="rich-title"></div>
      <div class="modal-rich-body" id="rich-body"></div>
    </div>

    <!-- ═══ MODAL: Table (structured data) ═══ -->
    <div class="modal-table hidden" id="modal-table">
      <button class="response-dismiss" id="table-dismiss" aria-label="Dismiss">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
      <div class="modal-table-title" id="table-title"></div>
      <div class="modal-table-wrap">
        <table class="modal-table-el" id="table-el">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="modal-table-footer" id="table-footer"></div>
    </div>

    <!-- ═══ MODAL: List (items / search results) ═══ -->
    <div class="modal-list hidden" id="modal-list">
      <button class="response-dismiss" id="list-dismiss" aria-label="Dismiss">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
      <div class="modal-list-title" id="list-title"></div>
      <div class="modal-list-message" id="list-message"></div>
      <div class="modal-list-items" id="list-items"></div>
    </div>

    <!-- ═══ MODAL: Confirm (action buttons) ═══ -->
    <div class="modal-confirm hidden" id="modal-confirm">
      <button class="response-dismiss" id="confirm-dismiss" aria-label="Dismiss">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
      <div class="modal-confirm-body" id="confirm-body"></div>
      <div class="modal-confirm-actions" id="confirm-actions"></div>
    </div>

    <!-- ═══ MODAL: Media (image viewer) ═══ -->
    <div class="modal-media hidden" id="modal-media">
      <button class="response-dismiss" id="media-dismiss" aria-label="Dismiss">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
      <div class="modal-media-message" id="media-message"></div>
      <img class="modal-media-img" id="media-img" alt="" />
      <div class="modal-media-caption" id="media-caption"></div>
    </div>

    <!-- ═══ MODAL: Steps (progress timeline / plan preview) ═══ -->
    <div class="modal-steps hidden" id="modal-steps">
      <button class="response-dismiss" id="steps-dismiss" aria-label="Dismiss">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
      <div class="modal-steps-title" id="steps-title"></div>
      <div class="modal-steps-subtitle" id="steps-subtitle"></div>
      <div class="modal-steps-message" id="steps-message"></div>
      <div class="modal-steps-timeline" id="steps-timeline"></div>
      <div class="modal-steps-actions hidden" id="steps-actions"></div>
    </div>

    <!-- ═══ MODAL: Cards (image + text cards) ═══ -->
    <div class="modal-products hidden" id="modal-products">
      <button class="response-dismiss" id="products-dismiss" aria-label="Dismiss">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
      <div class="modal-products-header" id="products-header">
        <div class="modal-products-header-text">
          <div class="modal-products-title" id="products-title"></div>
          <div class="modal-products-subtitle" id="products-subtitle"></div>
        </div>
      </div>
      <div class="modal-products-message" id="products-message"></div>
      <div class="modal-products-body" id="products-body">
        <div class="modal-products-grid" id="products-grid"></div>
        <div class="modal-products-sidebar hidden" id="products-sidebar"></div>
      </div>
    </div>

    <!-- ═══ Command Panel (shortcut-driven text prompting) ═══ -->
    <div class="command-panel hidden" id="command-panel">
      <div class="command-panel-header">
        <div class="command-panel-title">Moonwalk Agent</div>
        <button class="command-panel-close" id="command-panel-close" aria-label="Close">Close</button>
      </div>
      <div class="command-panel-subtitle">Type a request and run it directly.</div>
      <div class="command-panel-capabilities">
        Browser tasks, file edits, shell commands, app actions, Google Workspace, and multi-step agent execution.
      </div>
      <textarea
        id="command-input"
        class="command-input"
        placeholder="Example: research UK housing systems and create a Google document with findings"></textarea>
      <div class="command-panel-footer">
        <span class="command-panel-hint">Enter to send. Shift+Enter for newline.</span>
        <button class="command-panel-send" id="command-panel-send">Run</button>
      </div>
    </div>
  </div>

  <script src="../node_modules/katex/dist/katex.min.js"></script>
  <script src="./renderer.js"></script>
</body>

</html>
