<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moonwalk</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="stage">
    <div class="glass-pill state-idle" id="ui-wrapper">

      <!-- Speech (Idle / Listening) -->
      <div class="content-wrapper" id="ui-speech">
        <svg class="mic-icon" viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
          <path
            d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
        </svg>
        <span class="status-text" id="status-text">Hey Moonwalk</span>
      </div>

      <!-- Loading (Thinking) -->
      <div class="content-wrapper hidden" id="ui-loading">
        <div class="bouncing-balls">
          <div class="ball"></div>
          <div class="ball"></div>
          <div class="ball"></div>
        </div>
      </div>

      <!-- Doing (Action in progress) -->
      <div class="content-wrapper hidden" id="ui-doing">
        <div class="spinner"></div>
        <img src="" alt="App Icon" class="app-icon" id="app-icon" />
        <span class="status-text" id="doing-text">Processing...</span>
      </div>

    </div>

    <!-- Response Card (conversational answers — appears below pill) -->
    <div class="response-card hidden" id="ui-response">
      <button class="response-dismiss" id="response-dismiss" aria-label="Dismiss">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
      <div class="response-body">
        <span class="response-text" id="response-text"></span><span class="response-cursor"
          id="response-cursor">▌</span>
      </div>
    </div>

  </div>

  <!-- ═══ RIGHT-EDGE AGENT BUBBLE ═══ -->
  <div class="agent-bubble" id="agent-bubble" title="Agent Hub">
    <svg class="agent-bubble-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="8" r="4" />
      <path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2" />
    </svg>
    <div class="agent-bubble-dot hidden" id="agent-dot"></div>
  </div>

  <!-- ═══ TOOLS POPUP (appears beside bubble) ═══ -->
  <div class="tools-popup hidden" id="tools-popup">
    <div class="tools-popup-header">Tools</div>
    <div class="tools-grid">
      <div class="tool-item" data-tool="terminal">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 17 10 11 4 5" />
            <line x1="12" y1="19" x2="20" y2="19" />
          </svg>
        </div>
        <span>Terminal</span>
      </div>
      <div class="tool-item" data-tool="browser">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z" />
          </svg>
        </div>
        <span>Browser</span>
      </div>
      <div class="tool-item" data-tool="files">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
          </svg>
        </div>
        <span>Files</span>
      </div>
      <div class="tool-item" data-tool="python">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z" />
            <path d="M8 12l2 2 4-4" />
          </svg>
        </div>
        <span>Python</span>
      </div>
      <div class="tool-item" data-tool="email">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
        </div>
        <span>Email</span>
      </div>
      <div class="tool-item" data-tool="search">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>
        <span>Search</span>
      </div>
    </div>
  </div>

  <!-- ═══ BOTTOM AGENT DRAWER ═══ -->
  <div class="agent-drawer hidden" id="agent-drawer">
    <div class="drawer-handle" id="drawer-handle">
      <div class="drawer-handle-bar"></div>
    </div>
    <div class="drawer-header">
      <span class="drawer-title">Agent Threads</span>
      <span class="drawer-count" id="drawer-count">0 agents</span>
    </div>
    <div class="drawer-threads" id="drawer-threads">
      <!-- Agent thread cards will be injected here -->
      <div class="drawer-empty" id="drawer-empty">No agents running. Ask Moonwalk to spawn one!</div>
    </div>
  </div>

  <input id="key-capture" class="key-capture" type="text" />
  <script src="./renderer.js"></script>
</body>

</html>
