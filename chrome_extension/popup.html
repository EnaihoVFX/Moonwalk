<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moonwalk Bridge</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        width: 340px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1115;
        color: #f3f5f7;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      .card {
        border: 1px solid #262b36;
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 10px;
        background: #151923;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin: 6px 0;
        font-size: 12px;
      }
      .key { color: #9aa4b2; }
      .value {
        text-align: right;
        max-width: 180px;
        word-break: break-word;
      }
      .ok { color: #60d394; }
      .bad { color: #ff7b72; }
      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        margin-top: 8px;
        background: #4c8dff;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary { background: #2a3140; }
      .muted { color: #9aa4b2; font-size: 11px; line-height: 1.4; }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 11px;
        margin: 6px 0 0;
        color: #d7dee7;
      }
    </style>
  </head>
  <body>
    <h1>Moonwalk Browser Bridge</h1>

    <div class="card">
      <div class="row"><div class="key">Bridge</div><div id="bridgeStatus" class="value">Loading…</div></div>
      <div class="row"><div class="key">Session</div><div id="sessionId" class="value">—</div></div>
      <div class="row"><div class="key">Socket</div><div id="socketState" class="value">—</div></div>
      <div class="row"><div class="key">Last Message</div><div id="lastMessage" class="value">—</div></div>
      <div class="row"><div class="key">Last Error</div><div id="lastError" class="value">—</div></div>
      <button id="refreshBtn">Refresh Status</button>
      <button id="snapshotBtn" class="secondary">Request Active Tab Snapshot</button>
    </div>

    <div class="card">
      <div class="row"><div class="key">Snapshots</div><div id="snapshotCount" class="value">0</div></div>
      <div class="row"><div class="key">Latest URL</div><div id="latestUrl" class="value">—</div></div>
      <div class="row"><div class="key">Latest Title</div><div id="latestTitle" class="value">—</div></div>
      <div class="row"><div class="key">Elements</div><div id="elementCount" class="value">—</div></div>
      <pre id="latestMeta" class="muted">No snapshot yet.</pre>
    </div>

    <div class="muted">
      If Bridge stays disconnected, check <code>/tmp/moonwalk_browser_bridge.log</code> and Chrome extension errors.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
